# Test override — deterministic seeds, no caddy, no external deps
# Usage: docker compose -f docker-compose.yml -f docker-compose.test.yml up

services:
  frontend:
    environment:
      NODE_ENV: test
      NEXTAUTH_URL: http://localhost:3000
      NEXTAUTH_SECRET: test-secret-for-ci-only-not-production
      NEXT_PUBLIC_BFF_URL: http://localhost:8081
      NEXT_PUBLIC_MSW_ENABLED: 'true'

  bff:
    environment:
      DEMO_MODE: 'true'
      REDIS_URL: ''     # Disable redis in test

  caddy:
    profiles: ["!test"]

  redis:
    profiles: ["!test"]
