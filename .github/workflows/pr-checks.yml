name: PR Checks

on:
  workflow_dispatch:
  pull_request:
    types: [opened, synchronize, reopened]

concurrency:
  group: pr-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  fast-checks:
    name: Lint, Types & Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with: { version: '9' }

      - uses: actions/setup-node@v4
        with: { node-version: '20', cache: pnpm }

      - run: pnpm install --frozen-lockfile
      - run: pnpm lint
      - run: pnpm typecheck
      - run: pnpm test:unit

      - uses: actions/setup-python@v5
        with: { python-version: '3.12', cache: pip }

      - run: pip install -r bff/requirements.txt -r bff/requirements-dev.txt
      - run: pytest bff/tests/ -v --tb=short

  browser-triage:
    name: Browser Triage Smoke
    runs-on: ubuntu-latest
    needs: fast-checks
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with: { version: '9' }

      - uses: actions/setup-node@v4
        with: { node-version: '20', cache: pnpm }

      - uses: actions/setup-python@v5
        with: { python-version: '3.12', cache: pip }

      - run: pnpm install --frozen-lockfile
      - run: pip install -r bff/requirements.txt

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-chromium-${{ hashFiles('pnpm-lock.yaml', 'package.json') }}

      - name: Install Playwright Chromium
        run: pnpm exec playwright install chromium --with-deps

      - name: Start BFF
        run: |
          uvicorn bff.main:app --host 127.0.0.1 --port 8000 > /tmp/forge-bff.log 2>&1 &
          echo $! > /tmp/forge-bff.pid
          sleep 4
        env:
          DEMO_MODE: 'true'

      - name: Start Next.js
        run: |
          pnpm build
          pnpm start > /tmp/forge-next.log 2>&1 &
          echo $! > /tmp/forge-next.pid
          sleep 6
        env:
          NEXTAUTH_SECRET: ci-test-secret-32-chars-minimum!!
          NEXTAUTH_URL: http://localhost:3000
          NEXT_PUBLIC_BFF_URL: http://localhost:8000

      - name: Run browser triage
        run: pnpm triage:browser
        env:
          PLAYWRIGHT_BASE_URL: http://localhost:3000

      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report-browser-triage
          path: playwright-report/
          retention-days: 14

      - name: Upload Playwright test results
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: test-results-browser-triage
          path: test-results/
          retention-days: 7

      - name: Upload triage artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-artifacts-browser-triage
          path: playwright-artifacts/
          retention-days: 14

      - name: Dump service logs on failure
        if: failure()
        run: |
          echo "=== NEXT LOG ==="
          sed -n '1,240p' /tmp/forge-next.log || true
          echo "=== BFF LOG ==="
          sed -n '1,240p' /tmp/forge-bff.log || true
