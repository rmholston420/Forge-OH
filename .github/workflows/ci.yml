name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: '20'
  PYTHON_VERSION: '3.12'
  PNPM_VERSION: '9'
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ghcr.io/${{ github.repository_owner }}/forge-oh

jobs:
  # ------------------------------------------------------------------ #
  # 1. Lint + Type-check
  # ------------------------------------------------------------------ #
  lint-typecheck:
    name: Lint & Type-check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with: { version: '${{ env.PNPM_VERSION }}' }

      - uses: actions/setup-node@v4
        with:
          node-version: '${{ env.NODE_VERSION }}'
          cache: pnpm

      - run: pnpm install --frozen-lockfile
      - run: pnpm lint
      - run: pnpm typecheck

  # ------------------------------------------------------------------ #
  # 2. Unit + Integration Tests (Vitest)
  # ------------------------------------------------------------------ #
  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    needs: lint-typecheck
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with: { version: '${{ env.PNPM_VERSION }}' }

      - uses: actions/setup-node@v4
        with:
          node-version: '${{ env.NODE_VERSION }}'
          cache: pnpm

      - run: pnpm install --frozen-lockfile
      - run: pnpm test:unit --coverage

      - uses: codecov/codecov-action@v4
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: ./coverage/lcov.info
          flags: frontend
          fail_ci_if_error: false

  # ------------------------------------------------------------------ #
  # 3. BFF Tests (pytest)
  # ------------------------------------------------------------------ #
  bff-tests:
    name: BFF Tests
    runs-on: ubuntu-latest
    needs: lint-typecheck
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '${{ env.PYTHON_VERSION }}'
          cache: pip

      - run: pip install -r bff/requirements.txt -r bff/requirements-dev.txt
      - run: pytest bff/tests/ --cov=bff --cov-report=xml -v

      - uses: codecov/codecov-action@v4
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: ./coverage.xml
          flags: bff
          fail_ci_if_error: false

  # ------------------------------------------------------------------ #
  # 4. E2E Tests (Playwright)
  # ------------------------------------------------------------------ #
  e2e-tests:
    name: E2E (${{ matrix.browser }})
    runs-on: ubuntu-latest
    needs: [unit-tests, bff-tests]
    strategy:
      fail-fast: false
      matrix:
        browser: [chromium, firefox]
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with: { version: '${{ env.PNPM_VERSION }}' }

      - uses: actions/setup-node@v4
        with:
          node-version: '${{ env.NODE_VERSION }}'
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ matrix.browser }}-${{ hashFiles('package.json') }}

      - run: pnpm exec playwright install ${{ matrix.browser }} --with-deps

      - name: Start BFF
        run: |
          pip install -r bff/requirements.txt
          uvicorn bff.main:app --host 0.0.0.0 --port 8000 &
          sleep 3
        env:
          DEMO_MODE: 'true'

      - name: Start Next.js
        run: |
          pnpm build
          pnpm start &
          sleep 5
        env:
          NEXTAUTH_SECRET: ${{ secrets.NEXTAUTH_SECRET || 'ci-test-secret-32-chars-minimum!!' }}
          NEXTAUTH_URL: http://localhost:3000
          NEXT_PUBLIC_BFF_URL: http://localhost:8000

      - run: pnpm exec playwright test --project=${{ matrix.browser }}
        env:
          PLAYWRIGHT_BASE_URL: http://localhost:3000

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report-${{ matrix.browser }}
          path: playwright-report/
          retention-days: 14

      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: test-results-${{ matrix.browser }}
          path: test-results/
          retention-days: 7

  # ------------------------------------------------------------------ #
  # 5. Docker Build + Push (main branch only)
  # ------------------------------------------------------------------ #
  docker-build:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: e2e-tests
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & push frontend
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ${{ env.IMAGE_PREFIX }}-frontend:${{ github.sha }}
            ${{ env.IMAGE_PREFIX }}-frontend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build & push BFF
        uses: docker/build-push-action@v6
        with:
          context: ./bff
          file: ./bff/Dockerfile
          push: true
          tags: |
            ${{ env.IMAGE_PREFIX }}-bff:${{ github.sha }}
            ${{ env.IMAGE_PREFIX }}-bff:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ------------------------------------------------------------------ #
  # 6. Security Scan (Trivy)
  # ------------------------------------------------------------------ #
  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest
    needs: docker-build
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    permissions:
      security-events: write
    steps:
      - uses: actions/checkout@v4

      - name: Run Trivy on frontend image
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.IMAGE_PREFIX }}-frontend:${{ github.sha }}
          format: sarif
          output: trivy-frontend.sarif
          severity: CRITICAL,HIGH
          exit-code: '0'

      - name: Run Trivy on BFF image
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.IMAGE_PREFIX }}-bff:${{ github.sha }}
          format: sarif
          output: trivy-bff.sarif
          severity: CRITICAL,HIGH
          exit-code: '0'

      - uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-frontend.sarif
          category: trivy-frontend

      - uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-bff.sarif
          category: trivy-bff
