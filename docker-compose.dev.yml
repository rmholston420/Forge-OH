# Development override — hot reload, no caddy, direct ports
# Usage: docker compose -f docker-compose.yml -f docker-compose.dev.yml up

services:
  frontend:
    build:
      target: deps        # Use deps stage for faster rebuilds
    command: pnpm dev
    volumes:
      - .:/app
      - /app/node_modules
      - /app/.next
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: development
      NEXTAUTH_URL: http://localhost:3000
      NEXT_PUBLIC_BFF_URL: http://localhost:8081

  bff:
    # CRITICAL: entry point must be bff.main:app, not main:app.
    # See bff/Dockerfile CRITICAL comment for explanation.
    command: uvicorn bff.main:app --host 0.0.0.0 --port 8081 --reload
    volumes:
      - ./bff:/app/bff
    ports:
      - "8081:8081"
    environment:
      DEBUG: 'true'
      DEMO_MODE: 'true'

  caddy:
    profiles: ["!dev"]   # Exclude caddy in dev

  redis:
    ports:
      - "6379:6379"      # Expose redis locally in dev
