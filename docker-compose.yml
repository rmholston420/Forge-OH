# Forge-OH docker-compose
# Canonical ports:
#   BFF           -> 8081
#   OpenHands SDK -> 8090
# OpenHands runtime image tag: 0.60.0

version: '3.9'

services:
  bff:
    build:
      context: ./bff
      dockerfile: Dockerfile
    ports:
      - "8081:8081"
    environment:
      BFF_PORT: "8081"
      OPENHANDS_BASE_URL: "http://openhands:8090"
      SECRET_KEY: "${SECRET_KEY:-change-me-in-production}"
      TOKEN_TTL_HOURS: "8"
      FEATURE_RIGPA_LMS_ENABLED: "${FEATURE_RIGPA_LMS_ENABLED:-false}"
      OTEL_EXPORTER_OTLP_ENDPOINT: "${OTEL_EXPORTER_OTLP_ENDPOINT:-}"
      LOG_LEVEL: "${LOG_LEVEL:-INFO}"
    depends_on:
      - openhands
    restart: unless-stopped

  openhands:
    image: ghcr.io/all-hands-ai/openhands:0.60.0
    ports:
      - "8090:8090"
    environment:
      PORT: "8090"
      OPENHANDS_API_KEY: "${OPENHANDS_API_KEY:-}"
    volumes:
      - openhands-data:/opt/openhands/data
    restart: unless-stopped

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_BFF_URL: "http://localhost:8081"
    depends_on:
      - bff
    restart: unless-stopped

volumes:
  openhands-data:
